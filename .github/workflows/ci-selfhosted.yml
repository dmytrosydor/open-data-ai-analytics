name: CI Visualization (self-hosted)

on:
  workflow_dispatch:

jobs:
  run-visualization-local:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4


      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps (uv)
        run: |
          uv sync --python 3.11.9

      - name: Run visualization from src
        run: |
          cd src
          uv run --python 3.11.9 python visualization.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visualization-selfhosted-artifacts
          path: |
            artifacts/**
            src/artifacts/**
            reports/**