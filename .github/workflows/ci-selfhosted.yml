name: CI Modules (self-hosted)

on:
  workflow_dispatch:

jobs:
  # --- JOB 1: Перевірка data_load.py ---
  lint-data-load:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --python 3.11.9
      - run: uv pip install ruff
      - run: uv run ruff check src/data_load.py
      - run: uv run python -m py_compile src/data_load.py

  # --- JOB 2: Перевірка data_quality.py ---
  lint-data-quality:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --python 3.11.9
      - run: uv pip install ruff
      - run: uv run ruff check src/data_quality.py
      - run: uv run python -m py_compile src/data_quality.py

  # --- JOB 3: Перевірка visualization.py ---
  lint-visualization:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --python 3.11.9
      - run: uv pip install ruff
      - run: uv run ruff check src/visualization.py
      - run: uv run python -m py_compile src/visualization.py

  # --- JOB 4: Фінальний запуск (чекає на перші три) ---
  run-visualization:
    needs: [lint-data-load, lint-data-quality, lint-visualization]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Install dependencies
        run: uv sync --python 3.11.9
        
      - name: Run visualization module
        run: |
          cd src
          uv run --python 3.11.9 python visualization.py
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visualization-selfhosted-artifacts
          path: |
            artifacts/**
            src/artifacts/**
            reports/**
