name: CI Visualization (self-hosted)

on:
  workflow_dispatch:

jobs:
  run-visualization-local:
    runs-on: [self-hosted, wsl]

    steps:
      - uses: actions/checkout@v4

      # ДОДАНО: Цей крок гарантує, що у вас буде робочий Python із pip
      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install deps (uv)
        run: |
          uv sync --python 3.11.9

      - name: Run visualization from src
        run: |
          cd src
          uv run --python 3.11.9 python visualization.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visualization-selfhosted-artifacts
          path: |
            artifacts/**
            src/artifacts/**
            reports/**