name: CI Visualization (uv)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-visualization:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"


      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv


      - name: Install dependencies (uv)
        run: |
          uv sync --python 3.11.9

      - name: Run visualization
        run: |
          cd src
          uv run --python 3.11.9 python visualization.py


      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visualization-artifacts
          path: |
            artifacts/**
            src/artifacts/**
            reports/**
